name: Semantic Pull Request

on:
  pull_request:
    types:
      - edited
      - opened
      - synchronize
      - reopened

permissions:
  pull-requests: read

jobs:
  validate-title:
    name: Validate Title
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Validate pull request title
        uses: amannn/action-semantic-pull-request@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          validateSingleCommit: true
