name: Skill Sync Check

on:
  pull_request:

permissions:
  contents: read

jobs:
  skill-sync:
    name: SKILL.md Sync
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Check SKILL.md is in sync with content.ts
        run: npm run check:skill-sync
